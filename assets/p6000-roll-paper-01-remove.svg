<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Remove current roll</title>
  <desc id="desc">A clean instructional illustration showing a large-format printer with the roll cover open, the paper rewinding, and the roll being lifted out.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#cc0000"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-opacity=".15"/></filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="#fff"/>
  <text x="56" y="64" font-family="Arial" font-size="30" font-weight="700" fill="#202020">1. Open, rewind, unlock, and remove</text>
  <g transform="translate(70 105)" filter="url(#shadow)">
    <rect x="0" y="105" width="650" height="215" rx="28" fill="#eeeeee" stroke="#202020" stroke-width="5"/>
    <path d="M80 105 Q325 -5 570 105" fill="#d7d7d7" stroke="#202020" stroke-width="5"/>
    <path d="M85 103 Q325 30 565 103" fill="#fafafa" stroke="#202020" stroke-width="4"/>
    <rect x="110" y="145" width="430" height="95" rx="48" fill="#2f2f2f"/>
    <circle cx="150" cy="192" r="47" fill="#bdbdbd" stroke="#202020" stroke-width="4"/>
    <circle cx="500" cy="192" r="47" fill="#bdbdbd" stroke="#202020" stroke-width="4"/>
    <rect x="170" y="166" width="310" height="52" rx="25" fill="#f5f5f5" stroke="#202020" stroke-width="4"/>
    <path d="M330 154 C280 110 285 70 330 50" fill="none" stroke="#cc0000" stroke-width="10" marker-end="url(#arrow)"/>
    <path d="M155 255 L120 305" stroke="#cc0000" stroke-width="9" marker-end="url(#arrow)"/>
    <path d="M495 255 L530 305" stroke="#cc0000" stroke-width="9" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(790 118)">
    <rect width="350" height="300" rx="24" fill="#f7f7f7" stroke="#dddddd" stroke-width="3"/>
    <circle cx="58" cy="68" r="28" fill="#cc0000"/><text x="58" y="78" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#fff">1</text>
    <text x="105" y="61" font-family="Arial" font-size="23" font-weight="700" fill="#202020">Open cover</text>
    <text x="105" y="90" font-family="Arial" font-size="19" fill="#555">Raise the roll-paper cover.</text>
    <circle cx="58" cy="154" r="28" fill="#cc0000"/><text x="58" y="164" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#fff">2</text>
    <text x="105" y="147" font-family="Arial" font-size="23" font-weight="700" fill="#202020">Rewind paper</text>
    <text x="105" y="176" font-family="Arial" font-size="19" fill="#555">Use the paper-release control.</text>
    <circle cx="58" cy="240" r="28" fill="#cc0000"/><text x="58" y="250" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#fff">3</text>
    <text x="105" y="233" font-family="Arial" font-size="23" font-weight="700" fill="#202020">Unlock and lift</text>
    <text x="105" y="262" font-family="Arial" font-size="19" fill="#555">Store the roll on a clean surface.</text>
  </g>
</svg>

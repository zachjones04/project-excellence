name: P6000 JPEG repair v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: photo-repair
          fetch-depth: 0
          show-progress: false
      - name: Rebuild direct JPEG assets
        run: python tools/repair_p6000.py
      - name: Save repair to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace fragile P6000 SVGs with real JPEG photos"
          git push origin HEAD:photo-repair

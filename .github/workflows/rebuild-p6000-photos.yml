name: Rebuild P6000 real-photo assets

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repair branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: photo-repair

      - name: Convert embedded real photos to normal JPEG files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          root = Path('.')
          photo_dir = root / 'assets' / 'p6000-real'
          stems = [
              'step-01-open-cover',
              'step-02-remove-roll',
              'step-03-core-size',
              'step-04-attach-adapters',
              'step-05-seat-roll',
              'step-06-feed-edge',
              'step-07-align-close',
              'step-08-load-confirm',
          ]

          print('Extracting full real-photo JPEG bytes...')
          for stem in stems:
              svg_path = photo_dir / f'{stem}.svg'
              jpg_path = photo_dir / f'{stem}.jpg'
              svg = svg_path.read_text(encoding='utf-8')
              marker = 'base64,'
              start = svg.index(marker) + len(marker)
              end = svg.index('"', start)
              image_bytes = base64.b64decode(svg[start:end])
              if not image_bytes.startswith(b'\xff\xd8\xff'):
                  raise RuntimeError(f'Invalid JPEG signature: {svg_path}')
              jpg_path.write_bytes(image_bytes)
              svg_path.unlink()
              print(f'  {jpg_path}: {len(image_bytes):,} bytes')

          data_path = root / 'data.js'
          data = data_path.read_text(encoding='utf-8')
          for stem in stems:
              data = data.replace(
                  f'assets/p6000-real/{stem}.svg',
                  f'assets/p6000-real/{stem}.jpg',
              )
          data_path.write_text(data, encoding='utf-8')

          app_path = root / 'app.js'
          app = app_path.read_text(encoding='utf-8')
          app = app.replace('\n  hydrateGuidePhotos();', '')
          function_start = app.index('\nasync function hydrateGuidePhotos()')
          function_end = app.index('\nfunction label', function_start)
          app = app[:function_start] + '\n' + app[function_end:]
          embedded_line = '    const embeddedPhoto = step.image.toLowerCase().endsWith(".svg") ? ` data-embedded-photo="${step.image}"` : "";\n'
          app = app.replace(embedded_line, '')
          app = app.replace('${embeddedPhoto}', '')
          app_path.write_text(app, encoding='utf-8')

          css_path = root / 'guide.css'
          css = css_path.read_text(encoding='utf-8')
          css = re.sub(r'\.visual-step-media:before\{[^}]*\}', '', css)
          css = re.sub(r'\.visual-step-media img\.photo-ready\{[^}]*\}', '', css)
          css = re.sub(r'\.photo-fallback(?: span| strong| small)?\{[^}]*\}', '', css)
          css = re.sub(r'@keyframes photoFade\{from\{[^}]*\}to\{[^}]*\}\}', '', css)
          css = re.sub(r'@media\(prefers-reduced-motion:reduce\)\{\.visual-step-media img\.photo-ready\{[^}]*\}\}', '', css)
          css = re.sub(
              r'\.visual-step-media img\{[^}]*\}',
              '.visual-step-media img{position:relative;z-index:1;display:block;width:100%;height:100%;max-width:900px;object-fit:contain;background:#f8f6f3;border-radius:10px;box-shadow:0 3px 14px rgba(49,43,38,.08);image-rendering:auto}',
              css,
              count=1,
          )
          css = css.replace('background:linear-gradient(145deg,#ece8e3,#f7f4f0)', 'background:#f3f0ec')
          css_path.write_text(css, encoding='utf-8')

          index_path = root / 'index.html'
          index = index_path.read_text(encoding='utf-8').replace(
              '20260705-photo-fix',
              '20260705-real-jpg',
          )
          index_path.write_text(index, encoding='utf-8')

          final_data = data_path.read_text(encoding='utf-8')
          final_app = app_path.read_text(encoding='utf-8')
          for stem in stems:
              jpg_path = photo_dir / f'{stem}.jpg'
              assert jpg_path.exists() and jpg_path.stat().st_size > 40000, jpg_path
              assert final_data.count(f'assets/p6000-real/{stem}.jpg') == 1, stem
          assert not list(photo_dir.glob('*.svg'))
          assert 'hydrateGuidePhotos' not in final_app
          assert 'data-embedded-photo' not in final_app
          assert '${embeddedPhoto}' not in final_app

          (root / '.github' / 'workflows' / 'rebuild-p6000-photos.yml').unlink()
          print('All eight real JPEGs and direct image references validated.')
          PY

      - name: Commit repaired guide to branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace fragile P6000 SVGs with real JPEG photos [p6000-cleanup]"
          git push origin HEAD:photo-repair

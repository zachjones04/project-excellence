name: Install P6000 photo assets

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/install-p6000-assets.yml

permissions:
  contents: write

jobs:
  install-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download approved photo blobs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import pathlib
          import urllib.request

          assets = {
              "assets/p6000/open.webp": "0acc4a88a7c87412fd52ec1cd331a4a654005fd4",
              "assets/p6000/remove.webp": "d078f537f02bdc0f56b66f56a63944693cd22994",
              "assets/p6000/prepare.avif": "a6f20caa985c5b4be7384460111ed98cc01bc29a",
              "assets/p6000/seat.avif": "971a6bc3e7f453a38a3068a77315f5065759321b",
              "assets/p6000/feed.webp": "526514490920d6194389a7eeedbb90e9a4658996",
              "assets/p6000/verify.avif": "0d8302ee075a83bddc08a2977f2bba2635c891a1",
          }
          token = os.environ["GH_TOKEN"]
          repository = os.environ["REPOSITORY"]
          for path, sha in assets.items():
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{repository}/git/blobs/{sha}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)
              data = base64.b64decode(payload["content"])
              destination = pathlib.Path(path)
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(data)
          PY
      - name: Commit normal image files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/p6000
          git rm .github/workflows/install-p6000-assets.yml
          git commit -m "Add approved P6000 guide photos"
          git push
